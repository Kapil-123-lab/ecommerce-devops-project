services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: ecommerce-backend
    ports:
      - "5001:5000"

    environment:
      - MONGO_URI=mongodb://mongodb:27017/ecommerce

    depends_on:
      - mongodb

volumes:
  mongo-data:
